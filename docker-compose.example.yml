services:
  axonhub-patch:
    build: .
    container_name: axonhub-patch
    restart: unless-stopped
    environment:
      AXONHUB_URL: http://axonhub-app:8090
      REDIS_ADDR: redis:6379
      SETTINGS_PATH: /data/config.json
      PANEL_USERNAME: admin
      PANEL_PASSWORD: change-me
      THREAD_ENABLED: "true"
      TRACE_ENABLED: "true"
      THREAD_TTL: 720h
      KEY_PREFIX: ahpatch
      RESPECT_EXISTING_THREAD: "true"
      RESPECT_EXISTING_TRACE: "false"
      CLAUDE_THINKING_REWRITE_ENABLED: "false"
      CLAUDE_THINKING_REWRITE_MODELS: claude-opus-4-7
      CLAUDE_THINKING_REWRITE_EFFORT: xhigh
    ports:
      - "8080:8080"
    depends_on:
      - redis
    volumes:
      - patch-data:/data
    networks:
      - axonhub-net

  redis:
    image: redis:7-alpine
    container_name: axonhub-patch-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - axonhub-net

networks:
  axonhub-net:
    external: true
    name: axonhub_default

volumes:
  redis-data:
  patch-data:
